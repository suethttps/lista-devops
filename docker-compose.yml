# Apenas para DESENVOLVIMENTO local — sobe um PostgreSQL igual ao de produção.
# Em produção o banco é gerenciado pelo Kamal (accessory), não por este arquivo.
#
#   docker compose up -d      # sobe o banco
#   docker compose down       # para o banco (mantém os dados)
#   docker compose down -v     # para e apaga os dados
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lista_development
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
